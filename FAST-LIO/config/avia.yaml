common:
    lid_topic:  "/livox/lidar"
    imu_topic:  "/vn200/imu"
    time_sync_en: true         # ONLY turn on when external time synchronization is really not possible

preprocess:
    lidar_type: 1                # 1 for Livox serials LiDAR, 2 for Velodyne LiDAR, 3 for ouster LiDAR, 
    scan_line: 1
    blind: 0.5

mapping:
    acc_cov: 6.0e-2
    gyr_cov: 5.0e-3
    b_acc_cov: 8.0e-5
    b_gyr_cov: 3.0e-6
    fov_degree:    90
    det_range:     100.0
    extrinsic_T: [ -0.010514839241742317,   -0.008989784841758377,   0.037356468638334630 ]
    extrinsic_R: [  0.99985813160508060000, -0.0002258196228773494, -0.0168423771687589430,
                     -0.00017111407692153792, -0.9999947058517530000,  0.0032494597148797887,
                     -0.01684302179448474500, -0.0032461167514232880, -0.9998528768488223000]

publish:     
    scan_publish_en:  true       # 'false' will close all the point cloud output
    dense_publish_en: ture       # false will low down the points number in a global-frame point clouds scan.
    scan_bodyframe_pub_en: true  # output the point cloud scans in IMU-body-frame